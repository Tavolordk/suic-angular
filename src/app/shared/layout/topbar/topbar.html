<header class="topbar">
    <div class="topbar__brand">
        <img src="seguridad-logo.png" alt="Seguridad" />
    </div>

    <h1 class="topbar__title">Sistema Plataforma México</h1>

    <div class="topbar__right">
        <div class="topbar__clock">
            <i class="fa-regular fa-clock"></i>
            <div>
                <strong>13:04:14</strong>
                <span>Mar, 19 De May De 2026</span>
            </div>
        </div>

        <button class="topbar__user" type="button" [attr.aria-label]="'Cerrar sesión de ' + displayName()"
            title="Cerrar sesión" (click)="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </div>
</header>
