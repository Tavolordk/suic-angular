<div class="association-graph">
    <svg class="association-graph__canvas" [attr.viewBox]="'0 0 ' + width + ' ' + height"
        preserveAspectRatio="xMidYMid meet">
        <defs>
            <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.32)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
            </radialGradient>

            <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35" />
            </filter>
        </defs>

        <g class="association-graph__grid">
            @for (line of [80, 160, 240, 320, 400, 480, 560, 640, 720, 800]; track line) {
            <line [attr.x1]="line" y1="0" [attr.x2]="line" [attr.y2]="height" />
            }

            @for (line of [80, 160, 240, 320, 400, 480]; track line) {
            <line x1="0" [attr.y1]="line" [attr.x2]="width" [attr.y2]="line" />
            }
        </g>

        <g class="association-graph__links">
            @for (link of links; track link.id) {
            @if (findNode(link.source); as source) {
            @if (findNode(link.target); as target) {
            <line [attr.x1]="source.x" [attr.y1]="source.y" [attr.x2]="target.x" [attr.y2]="target.y"
                [attr.stroke-width]="getLineWidth(link.strength)" />

            <text class="association-graph__link-label" [attr.x]="(source.x + target.x) / 2"
                [attr.y]="(source.y + target.y) / 2 - 8">
                {{ link.label }}
            </text>
            }
            }
            }
        </g>

        <g class="association-graph__nodes">
            @for (node of nodes; track node.id) {
            <g class="association-graph__node" [class.association-graph__node--selected]="selectedNodeId === node.id"
                [class]="'association-graph__node association-graph__node--' + node.risk"
                [attr.transform]="'translate(' + node.x + ',' + node.y + ')'" (click)="selectNode(node.id)">
                <circle class="association-graph__node-glow" r="42"></circle>
                <circle class="association-graph__node-circle" r="27"></circle>

                <text class="association-graph__node-icon" y="5">
                    {{ getNodeIcon(node.type) }}
                </text>

                <text class="association-graph__node-label" y="48">
                    {{ node.label }}
                </text>

                <text class="association-graph__node-type" y="64">
                    {{ node.type }}
                </text>
            </g>
            }
        </g>
    </svg>
</div>
