<section class="profile-page">
    <header class="profile-page__toolbar">
        <a routerLink="/busqueda" class="profile-page__back">
            <i class="fa-solid fa-arrow-left"></i>
            Regresar a resultados
        </a>

        <span class="profile-page__section">Personas</span>

        <button type="button" class="profile-page__save">
            <i class="fa-regular fa-floppy-disk"></i>
            Guardar perfil
        </button>
    </header>

    @if (selectedSource(); as source) {
    <div class="profile-page__grid">
        <app-source-list [sources]="sources()" [selectedSourceId]="source.id" (sourceSelected)="selectSource($event)" />

        <app-data-selection [source]="source" (fieldToggled)="toggleField($event)" (selectAllRequested)="selectAll()" />

        <app-consolidated-profile [profileId]="profileId" [completedLabel]="completedLabel()"
            [selectedFields]="selectedFields()" [accepted]="accepted()" (acceptedRequested)="accept()" />
    </div>
    }
</section>
