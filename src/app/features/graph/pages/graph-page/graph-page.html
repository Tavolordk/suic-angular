<section class="graph-page">
    <app-graph-toolbar [personId]="personId" [totalNodes]="totalNodes()" [totalLinks]="totalLinks()" />

    <div class="graph-page__layout">
        <main class="graph-page__canvas">
            <app-association-graph [nodes]="nodes()" [links]="links()" [selectedNodeId]="selectedNode()?.id"
                (nodeSelected)="selectNode($event)" />
        </main>

        <app-graph-node-detail [node]="selectedNode()" />
    </div>
</section>
